<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Management - Кіру</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header h1 {
        color: #333;
        font-size: 28px;
        margin-bottom: 10px;
    }

    .login-header p {
        color: #666;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: 500;
    }

    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }

    .btn-login:hover {
        background: #5a67d8;
    }

    .alert {
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 20px;
    }

    .alert-error {
        background: #fee;
        color: #c33;
        border: 1px solid #fcc;
    }

    .alert-success {
        background: #e8f5e9;
        color: #2e7d32;
        border: 1px solid #a5d6a7;
    }

    .register-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
    }

    .register-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    .register-link a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <h1>🏥 Hospital Management</h1>
    <p>Жүйеге кіру</p>
  </div>

  <!-- Қате хабарламасы -->
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <!-- Сәтті хабарлама -->
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${param.registered}" class="alert alert-success">
    Тіркелу сәтті өтті! Жүйеге кіріңіз.
  </div>
  <div th:if="${param.logout}" class="alert alert-success">
    Сіз жүйеден шықтыңыз.
  </div>

  <!-- Кіру формасы -->
  <form method="post" th:action="@{/login}">
    <div class="form-group">
      <label for="username">Логин</label>
      <input type="text" id="username" name="username" placeholder="Логиніңізді енгізіңіз" required>
    </div>

    <div class="form-group">
      <label for="password">Құпия сөз</label>
      <input type="password" id="password" name="password" placeholder="Құпия сөзіңізді енгізіңіз" required>
    </div>

    <button type="submit" class="btn-login">Кіру</button>
  </form>

  <div class="register-link">
    Әлі тіркелмедіңіз бе? <a href="/register">Тіркелу</a>
  </div>

  <!-- Тестілік деректер (тек дамыту кезеңінде) -->
  <div style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 5px; font-size: 14px; color: #666;">
    <p><strong>Тестілік пайдаланушылар:</strong></p>
    <p>Админ: admin / admin123</p>
    <p>Пайдаланушы: user / user123</p>
  </div>
</div>
</body>
</html>
